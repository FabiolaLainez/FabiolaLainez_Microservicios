version: '3.8'
services:
  productservice:
    build: ./ProductService
    ports:
      - "5001:80"

  customerservice:
    build: ./CustomerService
    ports:
      - "5002:80"

  orderservice:
    build: ./OrderService
    ports:
      - "5003:80"

  gateway:
    build: ./Gateway
    ports:
      - "5000:80"
    depends_on:
      - productservice
      - customerservice
      - orderservice
